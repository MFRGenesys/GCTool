<style>
    .updated {
        background-color: #d4edda;
        color: #155724;
    }
    .posterior {
        background-color: #f8f9fa;
        color: #6c757d;
    }
</style>

<!-- Priorisation Tab Content -->
<div class="box box-primary" id="priorisationRoot">
  <div class="box-header with-border">
    <h3 class="box-title">
      <i class="fa fa-sort-amount-desc"></i> Priorisation - Recherche d'interactions anciennes
    </h3>
  </div>

  <div class="box-body">
    <div class="row" style="margin-bottom: 10px;">
      <div class="col-md-5">
        <div class="form-group">
          <label for="prioQueueSelect">Queue</label>
          <select id="prioQueueSelect" class="form-control" style="width: 100%;">
            <option value="">Sélectionner une queue…</option>
          </select>
        </div>
      </div>

      <div class="col-md-3">
        <div class="form-group">
          <label for="prioDate">Date</label>
          <input id="prioDate" type="date" class="form-control" />
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label>&nbsp;</label>
          <button id="prioSearchBtn" class="btn btn-primary btn-block">
            <i class="fa fa-search"></i> Lancer la recherche
          </button>
          <button id="loadMoreButton" class="btn btn-primary btn-group" style="display: none;" onclick="loadMoreInteractions()">Charger plus</button>
          <button id="updatePriorityButton" class="btn btn-primary btn-block" onclick="updatePriority()" disabled>Mettre à jour la priorité</button>
        </div>
      </div>
    </div>

    <div id="prioStatus" class="alert alert-info" style="display:none; margin-top:10px;"></div>

    <div class="table-responsive" style="margin-top: 10px;">
      <table id="prioResultsTable" class="table table-bordered table-condensed table-hover" style="font-size: 12px;">
        <thead style="background-color:#f5f5f5;">
          <tr>
            <th style="width:40px; text-align:center;">
              <input type="checkbox" id="selectAllCheckbox" title="Tout sélectionner" /><span id="selectedCount">0</span>
            </th>
            <th>ConversationId</th>
            <th>activityDate</th>
            <th>routingPriority</th>
          </tr>
        </thead>
        <tbody id="prioResultsTbody">
          <tr>
            <td colspan="4" class="text-muted" style="text-align:center;">
              Aucune donnée. Lance une recherche.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
