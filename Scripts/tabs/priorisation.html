<style>
    .updated {
        background-color: #d4edda;
        color: #155724;
    }
    .posterior {
        background-color: #f8f9fa;
        color: #6c757d;
    }
</style>

<!-- Priorisation Tab Content -->
<div class="box box-primary" id="priorisationRoot">
  <div class="box-header with-border">
    <h3 class="box-title">
      <i class="fa fa-sort-amount-desc"></i> <span data-i18n="tab.priorisation.title">Priorisation - Recherche d'interactions anciennes</span>
    </h3>
  </div>

  <div class="box-body">
    <div class="row" style="margin-bottom: 10px;">
      <div class="col-md-5">
        <div class="form-group">
          <label for="prioQueueSelect" data-i18n="tab.priorisation.queue">Queue</label>
          <select id="prioQueueSelect" class="form-control" style="width: 100%;">
            <option value="" data-i18n="tab.priorisation.select_queue">Selectionner une queue...</option>
          </select>
        </div>
      </div>

      <div class="col-md-3">
        <div class="form-group">
          <label for="prioDate" data-i18n="tab.priorisation.date">Date</label>
          <input id="prioDate" type="date" class="form-control" />
        </div>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <label>&nbsp;</label>
          <button id="prioSearchBtn" class="btn btn-primary btn-block">
            <i class="fa fa-search"></i> <span data-i18n="tab.priorisation.search">Lancer la recherche</span>
          </button>
          <button id="loadMoreButton" class="btn btn-primary btn-group" style="display: none;" onclick="loadMoreInteractions()" data-i18n="tab.priorisation.load_more">Charger plus</button>
          <button id="updatePriorityButton" class="btn btn-primary btn-block" onclick="updatePriority()" disabled data-i18n="tab.priorisation.update_priority">Mettre a jour la priorite</button>
        </div>
      </div>
    </div>

    <div id="prioStatus" class="alert alert-info" style="display:none; margin-top:10px;"></div>

    <div class="table-responsive" style="margin-top: 10px;">
      <table id="prioResultsTable" class="table table-bordered table-condensed table-hover" style="font-size: 12px;">
        <thead style="background-color:#f5f5f5;">
          <tr>
            <th style="width:40px; text-align:center;">
              <input type="checkbox" id="selectAllCheckbox" title="Tout sÃ©lectionner" /><span id="selectedCount">0</span>
            </th>
            <th>ConversationId</th>
            <th>activityDate</th>
            <th>routingPriority</th>
          </tr>
        </thead>
        <tbody id="prioResultsTbody">
          <tr>
            <td colspan="4" class="text-muted" style="text-align:center;">
              <span data-i18n="tab.priorisation.no_data">Aucune donnee. Lance une recherche.</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
