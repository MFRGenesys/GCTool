<!-- Information Tab Content -->
<div class="row">
    <div class="col-md-12">
        <div class="box box-primary">
            <div class="box-header with-border">
                <h3 class="box-title">
                    <i class="fa fa-info-circle"></i> <span data-i18n="tab.information.title">Informations de l'Organisation</span>
                </h3>
                <div class="box-tools pull-right">
                    <button type="button" class="btn btn-box-tool" onclick="refreshInformationPage()">
                        <i class="fa fa-refresh"></i> <span data-i18n="tab.information.refresh">Actualiser</span>
                    </button>
                </div>
            </div>
            <div class="box-body">
                <!-- Statistiques principales -->
                <div class="row">
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-aqua">
                            <div class="inner">
                                <h3 id="dataTablesCount">-</h3>
                                <p data-i18n="tab.information.stats.datatables">DataTables</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-table"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-green">
                            <div class="inner">
                                <h3 id="queuesCount">-</h3>
                                <p data-i18n="tab.information.stats.queues">Queues</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-phone"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-yellow">
                            <div class="inner">
                                <h3 id="skillsCount">-</h3>
                                <p data-i18n="tab.information.stats.skills">Skills</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-star"></i>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-3 col-xs-6">
                        <div class="small-box bg-red">
                            <div class="inner">
                                <h3 id="promptsCount">-</h3>
                                <p data-i18n="tab.information.stats.prompts">Prompts</p>
                            </div>
                            <div class="icon">
                                <i class="fa fa-volume-up"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Informations détaillées -->
                <div class="row">
                    <div class="col-md-6">
                        <div class="box box-solid">
                            <div class="box-header">
                                <h3 class="box-title" data-i18n="tab.information.org_details">Details de l'Organisation</h3>
                            </div>
                            <div class="box-body">
                                <table class="table table-bordered">
                                    <tr>
                                        <td><strong data-i18n="tab.information.region">Region :</strong></td>
                                        <td><span id="orgRegion">-</span></td>
                                    </tr>
                                    <tr>
                                        <td><strong data-i18n="tab.information.organization">Organisation :</strong></td>
                                        <td><span id="orgName">-</span>
                                        <button class="btn btn-xs btn-default" onclick="changeOrganization()" title="Changer d'organisation" data-i18n-title="tab.information.change_org">
                                        <i class="fa fa-exchange"></i></td>
                                    </tr>
                                    <tr>
                                        <td><strong data-i18n="tab.information.connected_user">Utilisateur connecte :</strong></td>
                                        <td><span id="currentUserName">-</span></td>
                                    </tr>
                                    <tr>
                                        <td><strong data-i18n="tab.information.user_id">ID Utilisateur :</strong></td>
                                        <td><code id="currentUserIdDisplay">-</code></td>
                                    </tr>
                                    <tr>
                                        <td><strong data-i18n="tab.information.last_sync">Derniere synchronisation :</strong></td>
                                        <td><span id="lastSyncTime">-</span></td>
                                    </tr>
                                </table>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="box box-solid">
                            <div class="box-header">
                                <h3 class="box-title" data-i18n="tab.information.quick_actions">Actions Rapides</h3>
                            </div>
                            <div class="box-body">
                                <button class="btn btn-primary btn-block" onclick="exportOrganizationSummary()">
                                    <i class="fa fa-download"></i> <span data-i18n="tab.information.export_summary">Exporter Resume Organisation</span>
                                </button>
                                <button class="btn btn-info btn-block" onclick="showDetailedStatistics()">
                                    <i class="fa fa-chart-bar"></i> <span data-i18n="tab.information.detailed_stats">Statistiques Detaillees</span>
                                </button>
                                <button class="btn btn-warning btn-block" onclick="refreshAllData()">
                                    <i class="fa fa-refresh"></i> <span data-i18n="tab.information.refresh_all">Actualiser Toutes les Donnees</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Graphiques et statistiques avancées -->
                <div class="row">
                    <div class="col-md-12">
                        <div class="box box-solid">
                            <div class="box-header">
                                <h3 class="box-title" data-i18n="tab.information.resources_distribution">Repartition des Ressources</h3>
                            </div>
                            <div class="box-body">
                                <div id="resourcesChart"></div>
                                <div id="detailedStats" style="display: none;">
                                    <!-- Contenu des statistiques détaillées -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
